        <a href="categories.html" class="sidebar-link">

        <a href="compare.html" class="sidebar-link">

        </a>
        <a href="deals.html" class="sidebar-link active">

          Deals
        </a>
        <a href="pages.html" class="sidebar-link">

          Pages
        </a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Audience</div>
        <a href="subscribers.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Subscribers
        </a>
        <a href="weekly.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2"/><polyline points="22,6 12,13 2,6"/></svg>
          Weekly
        </a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">System</div>
        <a href="settings.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </a>
      </div>
    </nav>
    <div class="sidebar-user">
      <div class="sidebar-user-avatar">👤</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name">Admin User</div>
        <div class="sidebar-user-role">Administrator</div>
      </div>
      <button class="sidebar-logout" onclick="logout()" title="Logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>

  <!-- Main Content -->
  <main class="admin-main">
    <header class="admin-header">
      <div class="header-left">
        <button class="header-toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="header-breadcrumb">
          <a href="index.html">Admin</a>
          <span>›</span>
          <strong>Deals</strong>
        </div>
      </div>
      <div class="header-right">
        <div class="header-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="Search deals..." id="searchInput">
        </div>
        <button class="header-notification">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="dot"></span>
        </button>
        <div class="header-user">
          <div class="header-user-avatar">👤</div>
          <span class="header-user-name">Admin</span>
        </div>
      </div>
    </header>

    <div class="admin-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Deals</h1>
          <p class="page-subtitle">Manage AI tool deals and coupons</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openNewDeal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Deal
          </button>
        </div>
      </div>

      <!-- Deals Table -->
      <div class="card">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Tool Name</th>
                <th>Category</th>
                <th>Discount</th>
                <th>Code</th>
                <th>Expires</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="dealsTable">
              <!-- Populated by JS -->
            </tbody>
          </table>
        </div>
        <div class="card-footer" style="display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:.85rem;color:var(--muted)">
            <span id="dealCount">0</span> deals found
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Deal Modal -->
<div class="modal-overlay" id="dealModal">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">New Deal</h3>
      <button class="modal-close" onclick="closeModal('dealModal')">✕</button>
    </div>
    <div class="modal-body">
      <form id="dealForm">
        <input type="hidden" id="dealId">
        <div class="form-group">
          <label class="form-label">Tool Name *</label>
          <input type="text" class="form-input" id="dealTool" placeholder="e.g. Jasper AI" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Category *</label>
            <select class="form-select" id="dealCategory" required>
              <option value="">Select category</option>
              <option value="writing">Writing</option>
              <option value="coding">Coding</option>
              <option value="productivity">Productivity</option>
              <option value="image">Image & Video</option>
              <option value="audio">Audio</option>
              <option value="business">Business</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Discount *</label>
            <input type="text" class="form-input" id="dealDiscount" placeholder="e.g. 20% OFF" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Coupon Code</label>
            <input type="text" class="form-input" id="dealCode" placeholder="e.g. STACKHK20">
          </div>
          <div class="form-group">
            <label class="form-label">Expiry Date</label>
            <input type="date" class="form-input" id="dealExpires">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="dealStatus">
            <option value="active">Active</option>
            <option value="expired">Expired</option>
            <option value="draft">Draft</option>
          </select>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('dealModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveDeal()">Save Deal</button>
    </div>
  </div>
</div>

<script src="js/admin.js"></script>
<script>
let currentDeals = [];

function loadDeals() {
  currentDeals = getStorageData('deals') || [];
  renderDeals(currentDeals);
}

function renderDeals(deals) {
  const tbody = document.getElementById('dealsTable');
  const count = document.getElementById('dealCount');

  if (deals.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="7" style="text-align:center;padding:3rem;color:var(--muted)">
          No deals found
        </td>
      </tr>
    `;
  } else {
    tbody.innerHTML = deals.map(deal => `
      <tr>
        <td><div style="font-weight:500">${deal.tool}</div></td>
        <td><span class="badge ${getCategoryBadgeClass(deal.category)}">${getCategoryName(deal.category)}</span></td>
        <td>${deal.discount}</td>
        <td><code style="font-family:var(--font-mono);font-size:.82rem;background:var(--bg);padding:.2rem .5rem;border-radius:4px">${deal.code || '-'}</code></td>
        <td style="color:var(--muted)">${deal.expires ? formatDate(deal.expires) : '-'}</td>
        <td><span class="table-status ${deal.status}">${deal.status}</span></td>
        <td>
          <div class="table-actions">
            <button class="btn btn-ghost btn-sm" onclick="editDeal(${deal.id})" title="Edit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn btn-ghost btn-sm" onclick="deleteDeal(${deal.id})" title="Delete" style="color:var(--danger)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  count.textContent = deals.length;
}

function openNewDeal() {
  document.getElementById('modalTitle').textContent = 'New Deal';
  document.getElementById('dealForm').reset();
  document.getElementById('dealId').value = '';
  openModal('dealModal');
}

function editDeal(id) {
  const deal = currentDeals.find(d => d.id === id);
  if (!deal) return;

  document.getElementById('modalTitle').textContent = 'Edit Deal';
  document.getElementById('dealId').value = deal.id;
  document.getElementById('dealTool').value = deal.tool;
  document.getElementById('dealCategory').value = deal.category;
  document.getElementById('dealDiscount').value = deal.discount;
  document.getElementById('dealCode').value = deal.code || '';
  document.getElementById('dealExpires').value = deal.expires || '';
  document.getElementById('dealStatus').value = deal.status;

  openModal('dealModal');
}

function saveDeal() {
  const id = document.getElementById('dealId').value;
  const tool = document.getElementById('dealTool').value.trim();
  const category = document.getElementById('dealCategory').value;
  const discount = document.getElementById('dealDiscount').value.trim();
  const code = document.getElementById('dealCode').value.trim();
  const expires = document.getElementById('dealExpires').value;
  const status = document.getElementById('dealStatus').value;

  if (!tool || !category || !discount) {
    showToast('Please fill in Tool Name, Category, and Discount', 'error');
    return;
  }

  if (id) {
    const index = currentDeals.findIndex(d => d.id === parseInt(id));
    if (index !== -1) {
      currentDeals[index] = { ...currentDeals[index], tool, category, discount, code, expires, status };
    }
  } else {
    const newDeal = {
      id: generateId(currentDeals),
      tool, category, discount, code, expires, status
    };
    currentDeals.unshift(newDeal);
  }

  setStorageData('deals', currentDeals);
  renderDeals(currentDeals);
  closeModal('dealModal');
  showToast(id ? 'Deal updated successfully' : 'Deal created successfully');
}

function deleteDeal(id) {
  if (!confirmDelete('Are you sure you want to delete this deal?')) return;

  currentDeals = currentDeals.filter(d => d.id !== id);
  setStorageData('deals', currentDeals);
  renderDeals(currentDeals);
  showToast('Deal deleted successfully');
}

// Search
document.getElementById('searchInput').addEventListener('input', debounce(function() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  if (!search) {
    renderDeals(currentDeals);
    return;
  }
  const filtered = currentDeals.filter(d =>
    d.tool.toLowerCase().includes(search) || d.discount.toLowerCase().includes(search) || (d.code && d.code.toLowerCase().includes(search))
  );
  renderDeals(filtered);
}, 300));

document.addEventListener('DOMContentLoaded', function() {
  loadDeals();
});
</script>
</body>
</html>
