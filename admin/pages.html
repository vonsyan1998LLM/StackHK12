<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Pages — StackHK Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="sidebar-logo"><img src="../images/logo.svg" alt="StackHK" class="logo-img" style="width:28px;height:28px;margin-right:8px;vertical-align:middle"> Stack<span>HK</span></a>
      <button class="sidebar-close">✕</button>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Main</div>
        <a href="index.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="reviews.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Reviews
        </a>
        <a href="categories.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Categories
        </a>
        <a href="compare.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Compare
        </a>
        <a href="deals.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
          Deals
        </a>
        <a href="pages.html" class="sidebar-link active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
          Pages
        </a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Audience</div>
        <a href="subscribers.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Subscribers
        </a>
        <a href="weekly.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2"/><polyline points="22,6 12,13 2,6"/></svg>
          Weekly
        </a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">System</div>
        <a href="settings.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </a>
      </div>
    </nav>
    <div class="sidebar-user">
      <div class="sidebar-user-avatar">👤</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name">Admin User</div>
        <div class="sidebar-user-role">Administrator</div>
      </div>
      <button class="sidebar-logout" onclick="logout()" title="Logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="admin-main">
    <header class="admin-header">
      <div class="header-left">
        <button class="header-toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="header-breadcrumb">
          <a href="index.html">Admin</a>
          <span>›</span>
          <strong>Pages</strong>
        </div>
      </div>
      <div class="header-right">
        <div class="header-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="Search pages..." id="searchInput">
        </div>
        <button class="header-notification">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="dot"></span>
        </button>
        <div class="header-user">
          <div class="header-user-avatar">👤</div>
          <span class="header-user-name">Admin</span>
        </div>
      </div>
    </header>

    <div class="admin-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Pages</h1>
          <p class="page-subtitle">Manage static page content</p>
        </div>
      </div>

      <!-- Filters -->
      <div style="display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap">
        <select class="form-select" style="width:auto;padding:.5rem 1rem;font-size:.85rem" id="filterStatus" onchange="filterPages()">
          <option value="">All Status</option>
          <option value="published">Published</option>
          <option value="draft">Draft</option>
        </select>
      </div>

      <!-- Pages Table -->
      <div class="card">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Page Name</th>
                <th>URL</th>
                <th>Last Updated</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="pagesTable">
              <!-- Populated by JS -->
            </tbody>
          </table>
        </div>
        <div class="card-footer" style="display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:.85rem;color:var(--muted)">
            <span id="pageCount">0</span> pages found
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Page Edit Modal -->
<div class="modal-overlay" id="pageModal">
  <div class="modal" style="max-width:700px">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Edit Page</h3>
      <button class="modal-close" onclick="closeModal('pageModal')">✕</button>
    </div>
    <div class="modal-body">
      <form id="pageForm">
        <input type="hidden" id="pageId">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Page Title *</label>
            <input type="text" class="form-input" id="pageTitle" placeholder="Page title" required>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-select" id="pageStatus">
              <option value="published">Published</option>
              <option value="draft">Draft</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Meta Description</label>
          <textarea class="form-textarea" id="pageMetaDesc" placeholder="SEO meta description" style="min-height:60px"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Hero Title *</label>
          <input type="text" class="form-input" id="pageHeroTitle" placeholder="Main headline" required>
        </div>
        <div class="form-group">
          <label class="form-label">Hero Subtitle</label>
          <input type="text" class="form-input" id="pageHeroSubtitle" placeholder="Supporting text">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">CTA Text</label>
            <input type="text" class="form-input" id="pageCtaText" placeholder="e.g. Get Started">
          </div>
          <div class="form-group">
            <label class="form-label">CTA Link</label>
            <input type="text" class="form-input" id="pageCtaLink" placeholder="e.g. /reviews">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Custom Content (HTML)</label>
          <textarea class="form-textarea" id="pageContent" placeholder="Additional HTML content for the page" style="min-height:120px;font-family:var(--font-mono);font-size:.85rem"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('pageModal')">Cancel</button>
      <button class="btn btn-primary" onclick="savePage()">Save Page</button>
    </div>
  </div>
</div>

<script src="js/admin.js"></script>
<script>
const DEFAULT_PAGES = [
  { id: 'home', name: 'Homepage', url: 'index.html', lastUpdated: '2025-05-11', status: 'published', heroTitle: 'The AI tool reviews you can actually trust.', heroSubtitle: 'We test, compare, and recommend the best AI products.' },
  { id: 'about', name: 'About Us', url: 'about.html', lastUpdated: '2025-05-10', status: 'published', heroTitle: 'About StackHK', heroSubtitle: "Hong Kong's premier AI tool review media." },
  { id: 'deals', name: 'Deals', url: 'deals.html', lastUpdated: '2025-05-09', status: 'published', heroTitle: 'AI Tool Deals & Discounts', heroSubtitle: 'Exclusive coupons and special offers.' },
  { id: 'submit', name: 'Submit Tool', url: 'submit.html', lastUpdated: '2025-05-08', status: 'published', heroTitle: 'Submit Your AI Tool', heroSubtitle: 'Have an AI tool you would like us to review?' },
  { id: 'search', name: 'Search', url: 'search.html', lastUpdated: '2025-05-11', status: 'published', heroTitle: 'Search StackHK', heroSubtitle: 'Find AI tool reviews, comparisons, deals, and more.' }
];

let currentPages = [];

function initPageData() {
  if (!getStorageData('pages')) {
    setStorageData('pages', DEFAULT_PAGES);
  }
}

function loadPages() {
  currentPages = getStorageData('pages') || [];
  renderPages(currentPages);
}

function renderPages(pages) {
  const tbody = document.getElementById('pagesTable');
  const count = document.getElementById('pageCount');

  if (pages.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="5" style="text-align:center;padding:3rem;color:var(--muted)">
          No pages found
        </td>
      </tr>
    `;
  } else {
    tbody.innerHTML = pages.map(page => `
      <tr>
        <td>
          <div style="font-weight:500">${page.name}</div>
          <div style="font-size:.78rem;color:var(--muted)">${page.id}</div>
        </td>
        <td><code style="font-family:var(--font-mono);font-size:.82rem;background:var(--bg-secondary);padding:.15rem .4rem;border-radius:4px">${page.url}</code></td>
        <td style="color:var(--muted)">${formatDate(page.lastUpdated)}</td>
        <td><span class="table-status ${page.status}">${page.status}</span></td>
        <td>
          <div class="table-actions">
            <button class="btn btn-ghost btn-sm" onclick="editPage('${page.id}')" title="Edit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  count.textContent = pages.length;
}

function filterPages() {
  const status = document.getElementById('filterStatus').value;
  const search = document.getElementById('searchInput').value.toLowerCase();

  let filtered = [...currentPages];

  if (status) {
    filtered = filtered.filter(p => p.status === status);
  }
  if (search) {
    filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(search) ||
      p.url.toLowerCase().includes(search) ||
      p.id.toLowerCase().includes(search)
    );
  }

  renderPages(filtered);
}

function editPage(id) {
  const page = currentPages.find(p => p.id === id);
  if (!page) return;

  document.getElementById('modalTitle').textContent = 'Edit: ' + page.name;
  document.getElementById('pageId').value = page.id;
  document.getElementById('pageTitle').value = page.name;
  document.getElementById('pageStatus').value = page.status;
  document.getElementById('pageMetaDesc').value = page.metaDesc || '';
  document.getElementById('pageHeroTitle').value = page.heroTitle || '';
  document.getElementById('pageHeroSubtitle').value = page.heroSubtitle || '';
  document.getElementById('pageCtaText').value = page.ctaText || '';
  document.getElementById('pageCtaLink').value = page.ctaLink || '';
  document.getElementById('pageContent').value = page.content || '';

  openModal('pageModal');
}

function savePage() {
  const id = document.getElementById('pageId').value;
  const name = document.getElementById('pageTitle').value;
  const status = document.getElementById('pageStatus').value;
  const metaDesc = document.getElementById('pageMetaDesc').value;
  const heroTitle = document.getElementById('pageHeroTitle').value;
  const heroSubtitle = document.getElementById('pageHeroSubtitle').value;
  const ctaText = document.getElementById('pageCtaText').value;
  const ctaLink = document.getElementById('pageCtaLink').value;
  const content = document.getElementById('pageContent').value;

  if (!name || !heroTitle) {
    showToast('Please fill in all required fields', 'error');
    return;
  }

  const index = currentPages.findIndex(p => p.id === id);
  if (index !== -1) {
    currentPages[index] = {
      ...currentPages[index],
      name,
      status,
      metaDesc,
      heroTitle,
      heroSubtitle,
      ctaText,
      ctaLink,
      content,
      lastUpdated: new Date().toISOString().split('T')[0]
    };
  }

  setStorageData('pages', currentPages);
  renderPages(currentPages);
  closeModal('pageModal');
  showToast('Page updated successfully');
}

document.getElementById('searchInput').addEventListener('input', debounce(filterPages, 300));

document.addEventListener('DOMContentLoaded', function() {
  initPageData();
  loadPages();
});
</script>
</body>
</html>
