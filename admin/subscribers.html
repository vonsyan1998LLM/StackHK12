      <div class="sidebar-section">

        <a href="subscribers.html" class="sidebar-link active">

        </a>
        <a href="weekly.html" class="sidebar-link">

  <!-- Main Content -->

    <div class="admin-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Subscribers</h1>
          <p class="page-subtitle">Manage newsletter subscribers</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-secondary" onclick="exportSubscribers()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export
          </button>
        </div>
      </div>

      <!-- Stats Cards -->
      <div class="stats-grid" id="subscriberStats">
        <!-- Populated by JS -->
      </div>

      <!-- Subscribers Table -->
      <div class="card">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Email</th>
                <th>Name</th>
                <th>Date</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="subscribersTable">
              <!-- Populated by JS -->
            </tbody>
          </table>
        </div>
        <div class="card-footer" style="display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:.85rem;color:var(--muted)">
            <span id="subscriberCount">0</span> subscribers found
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/admin.js"></script>
<script>
let currentSubscribers = [];

function loadSubscribers() {
  currentSubscribers = getStorageData('subscribers') || [];
  renderStats();
  renderSubscribers(currentSubscribers);
}

function renderStats() {
  const total = currentSubscribers.length;
  const active = currentSubscribers.filter(s => s.status === 'active').length;
  const unsubscribed = currentSubscribers.filter(s => s.status === 'unsubscribed').length;
  const growthRate = total > 0 ? Math.round((active / total) * 100) : 0;

  document.getElementById('subscriberStats').innerHTML = `
    <div class="stat-card">
      <div class="stat-card-header">
        <div class="stat-card-icon gold">👥</div>
      </div>
      <div class="stat-card-value">${total}</div>
      <div class="stat-card-label">Total Subscribers</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-header">
        <div class="stat-card-icon teal">✓</div>
      </div>
      <div class="stat-card-value">${active}</div>
      <div class="stat-card-label">Active</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-header">
        <div class="stat-card-icon info">✗</div>
      </div>
      <div class="stat-card-value">${unsubscribed}</div>
      <div class="stat-card-label">Unsubscribed</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-header">
        <div class="stat-card-icon warning">📈</div>
      </div>
      <div class="stat-card-value">${growthRate}%</div>
      <div class="stat-card-label">Growth Rate</div>
    </div>
  `;
}

function renderSubscribers(subscribers) {
  const tbody = document.getElementById('subscribersTable');
  const count = document.getElementById('subscriberCount');

  if (subscribers.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="5" style="text-align:center;padding:3rem;color:var(--muted)">
          No subscribers found
        </td>
      </tr>
    `;
  } else {
    tbody.innerHTML = subscribers.map(sub => `
      <tr>
        <td><a href="mailto:${sub.email}" style="color:var(--info);text-decoration:none">${sub.email}</a></td>
        <td style="font-weight:500">${sub.name || '-'}</td>
        <td style="color:var(--muted)">${formatDate(sub.date)}</td>
        <td><span class="table-status ${sub.status === 'active' ? 'published' : 'archived'}">${sub.status}</span></td>
        <td>
          <div class="table-actions">
            <button class="btn btn-ghost btn-sm" onclick="toggleSubscriberStatus(${sub.id})" title="${sub.status === 'active' ? 'Unsubscribe' : 'Reactivate'}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            </button>
            <button class="btn btn-ghost btn-sm" onclick="deleteSubscriber(${sub.id})" title="Delete" style="color:var(--danger)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  count.textContent = subscribers.length;
}

function toggleSubscriberStatus(id) {
  const index = currentSubscribers.findIndex(s => s.id === id);
  if (index === -1) return;

  const current = currentSubscribers[index].status;
  currentSubscribers[index].status = current === 'active' ? 'unsubscribed' : 'active';

  setStorageData('subscribers', currentSubscribers);
  renderStats();
  renderSubscribers(currentSubscribers);
  showToast(`Subscriber ${currentSubscribers[index].status === 'active' ? 'reactivated' : 'unsubscribed'}`);
}

function deleteSubscriber(id) {
  if (!confirmDelete('Are you sure you want to delete this subscriber?')) return;

  currentSubscribers = currentSubscribers.filter(s => s.id !== id);
  setStorageData('subscribers', currentSubscribers);
  renderStats();
  renderSubscribers(currentSubscribers);
  showToast('Subscriber deleted successfully');
}

function exportSubscribers() {
  const dataStr = JSON.stringify(currentSubscribers, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'stackhk-subscribers.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Subscribers exported successfully');
}

// Search
document.getElementById('searchInput').addEventListener('input', debounce(function() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  if (!search) {
    renderSubscribers(currentSubscribers);
    return;
  }
  const filtered = currentSubscribers.filter(s =>
    s.email.toLowerCase().includes(search) || (s.name && s.name.toLowerCase().includes(search))
  );
  renderSubscribers(filtered);
}, 300));

document.addEventListener('DOMContentLoaded', function() {
  loadSubscribers();
});
</script>
</body>
</html>
