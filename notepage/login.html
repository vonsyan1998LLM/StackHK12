<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — StackHK Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0F1117;
  --gold:#F5A623;
  --gold-dark:#D4891A;
  --teal:#00C2A0;
  --bg:#FAFAF8;
  --bg2:#F3F1EC;
  --border:#E8E6DF;
  --text:#1A1C22;
  --muted:#6B6B78;
  --card:#FFFFFF;
  --danger:#E83B3B;
  --font-display:'Playfair Display',Georgia,serif;
  --font-sans:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
  --radius:10px;
  --radius-lg:16px;
}
body{font-family:var(--font-sans);background:var(--black);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}

.login-container{width:100%;max-width:420px}
.login-header{text-align:center;margin-bottom:2rem}
.login-logo{font-family:var(--font-display);font-size:2rem;font-weight:900;color:#fff;margin-bottom:.5rem}
.login-logo span{color:var(--gold)}
.login-subtitle{color:rgba(255,255,255,.5);font-size:.9rem}

.login-card{background:var(--card);border-radius:var(--radius-lg);padding:2.5rem;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-card h2{font-family:var(--font-display);font-size:1.5rem;margin-bottom:.5rem;color:var(--text)}
.login-card p{color:var(--muted);font-size:.9rem;margin-bottom:2rem}

.form-group{margin-bottom:1.25rem}
.form-group label{display:block;font-weight:600;font-size:.85rem;margin-bottom:.5rem;color:var(--text)}
.form-group input{width:100%;padding:.75rem 1rem;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.9rem;font-family:var(--font-sans);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.form-group input:focus{border-color:var(--gold)}
.form-group input::placeholder{color:var(--muted)}

.form-options{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.form-options label{display:flex;align-items:center;gap:.5rem;font-size:.85rem;color:var(--muted);cursor:pointer}
.form-options label input{accent-color:var(--gold)}
.form-options a{font-size:.85rem;color:var(--gold);text-decoration:none;font-weight:500}
.form-options a:hover{color:var(--gold-dark)}

.btn-login{width:100%;background:var(--gold);color:var(--black);font-weight:700;font-size:1rem;padding:.85rem;border-radius:var(--radius);border:none;cursor:pointer;font-family:var(--font-sans);transition:background .15s,transform .1s}
.btn-login:hover{background:var(--gold-dark);transform:translateY(-1px)}
.btn-login:active{transform:translateY(0)}

.error-message{background:#FEF2F2;border:1px solid #FECACA;color:var(--danger);font-size:.85rem;padding:.75rem 1rem;border-radius:var(--radius);margin-bottom:1rem;display:none}
.error-message.show{display:flex;align-items:center;gap:.5rem}
.error-message svg{flex-shrink:0}

.login-footer{text-align:center;margin-top:1.5rem;color:rgba(255,255,255,.35);font-size:.78rem}
.login-footer a{color:rgba(255,255,255,.5);text-decoration:none}
.login-footer a:hover{color:#fff}

.loading{display:none;align-items:center;justify-content:center;gap:.5rem}
.loading.show{display:flex}
.spinner{width:18px;height:18px;border:2px solid rgba(0,0,0,.2);border-top-color:var(--black);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <div class="login-logo">Stack<span>HK</span></div>
    <div class="login-subtitle">Admin Dashboard</div>
  </div>
  
  <div class="login-card">
    <h2>Welcome back</h2>
    <p>Sign in to manage your content</p>
    
    <div class="error-message" id="errorMsg">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      <span id="errorText">Invalid username or password</span>
    </div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      
      <div class="form-options">
        <label>
          <input type="checkbox" id="remember"> Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>
      
      <button type="submit" class="btn-login" id="loginBtn">
        <span class="btn-text">Sign In</span>
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <span>Signing in...</span>
        </div>
      </button>
    </form>
  </div>
  
  <div class="login-footer">
    <p>&copy; 2025 StackHK Media. <a href="../index.html">Back to Website</a></p>
  </div>
</div>

<script>
const loginForm = document.getElementById('loginForm');
const errorMsg = document.getElementById('errorMsg');
const errorText = document.getElementById('errorText');
const loginBtn = document.getElementById('loginBtn');
const btnText = loginBtn.querySelector('.btn-text');
const loading = document.getElementById('loading');

// Check if already logged in
if (localStorage.getItem('stackhk_admin_auth') === 'true') {
  window.location.href = 'index.html';
}

loginForm.addEventListener('submit', function(e) {
  e.preventDefault();
  
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember').checked;
  
  // Show loading
  btnText.style.display = 'none';
  loading.classList.add('show');
  loginBtn.disabled = true;
  errorMsg.classList.remove('show');
  
  // Simulate API call
  setTimeout(function() {
    if (username === 'admin' && password === 'admin123') {
      // Success
      localStorage.setItem('stackhk_admin_auth', 'true');
      localStorage.setItem('stackhk_admin_user', JSON.stringify({
        username: 'admin',
        name: 'Admin User',
        role: 'Administrator',
        avatar: '👤',
        loginTime: new Date().toISOString()
      }));
      
      if (remember) {
        localStorage.setItem('stackhk_admin_remember', 'true');
      }
      
      window.location.href = 'index.html';
    } else {
      // Error
      errorText.textContent = 'Invalid username or password';
      errorMsg.classList.add('show');
      btnText.style.display = 'inline';
      loading.classList.remove('show');
      loginBtn.disabled = false;
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  }, 1000);
});

// Clear error on input
document.getElementById('username').addEventListener('input', function() {
  errorMsg.classList.remove('show');
});
document.getElementById('password').addEventListener('input', function() {
  errorMsg.classList.remove('show');
});
</script>
</body>
</html>
