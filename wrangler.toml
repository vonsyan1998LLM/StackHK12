name = "stackhk-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

# 静态资源
[site]
bucket = "./"

# KV namespace binding
[[kv_namespaces]]
binding = "STACKHK"
id = "ed9ee39834274da286d7f06aaaa7e5f9"

# 环境变量
[vars]
ENVIRONMENT = "production"

# 开发环境配置
[env.dev]
name = "stackhk-worker-dev"

[env.dev.vars]
ENVIRONMENT = "development"

# 生产环境配置
[env.production]
name = "stackhk-worker-prod"

[env.production.vars]
ENVIRONMENT = "production"